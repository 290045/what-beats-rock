<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>290045's What Beats Rock?</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; color: #1a1a1a; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); display: inline-block; max-width: 400px; width: 90%; }
        input { padding: 12px; font-size: 16px; width: 80%; border: 2px solid #e4e6eb; border-radius: 6px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #0070f3; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 6px; font-weight: bold; width: 87%; }
        button:hover { background: #0051b3; }
        .key-section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #e4e6eb; }
        #reasonDisplay { margin-top: 20px; font-size: 16px; line-height: 1.4; color: #4e5d78; }
    </style>
</head>
<body>
    <div class="box">
        <!-- API Key Input Section -->
        <div class="key-section" id="keySection">
            <h3>Enter OpenAI API Key to Play</h3>
            <input type="password" id="apiKeyInput" placeholder="sk-proj-...">
            <button onclick="saveKey()">Save Key Locally</button>
        </div>

        <!-- Game Loop Section -->
        <div id="gameSection" style="display: none;">
            <h2 id="scoreDisplay">Score: 0</h2>
            <h1 id="promptText">What beats Rock?</h1>
            <input type="text" id="guessInput" placeholder="Type your guess..." onkeypress="handleKeyPress(event)">
            <button onclick="submitGuess()">Submit</button>
            <p id="reasonDisplay"></p>
        </div>
    </div>

    <script>
        let currentItem = "Rock";
        let score = 0;
        let history = ["Rock"];
        let apiKey = "";

        // Check if an API key was previously saved in the browser
        window.onload = function() {
            const savedKey = localStorage.getItem("openai_api_key");
            if (savedKey) {
                apiKey = savedKey;
                showGame();
            }
        }

        function saveKey() {
            const input = document.getElementById("apiKeyInput").value.trim();
            if (!input) return alert("Please enter a valid key!");
            apiKey = input;
            localStorage.setItem("openai_api_key", apiKey); // Saves securely to user's browser storage
            showGame();
        }

        function showGame() {
            document.getElementById("keySection").style.display = "none";
            document.getElementById("gameSection").style.display = "block";
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") submitGuess();
        }

        async function submitGuess() {
            const userInput = document.getElementById("guessInput").value.trim();
            if (!userInput) return;

            // Strict duplicate check
            if (history.map(h => h.toLowerCase()).includes(userInput.toLowerCase())) {
                document.getElementById("reasonDisplay").innerText = `Game Over! You already used "${userInput}".`;
                return;
            }

            document.getElementById("reasonDisplay").innerText = "Thinking...";

            const systemPrompt = "You are the referee for 'What Beats X'. Assess if the user's guess logically beats the current item. Respond ONLY in valid JSON matching this schema: {\"win\": bool, \"reason\": string}";
            const userPrompt = `Current Item: '${currentItem}'. User Guess: '${userInput}'.`;

            try {
                // Calling OpenAI directly from the browser instead of a backend server
                const response = await fetch("https://openai.com", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        response_format: { type: "json_object" },
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) throw new Error("API call failed. Check your key.");

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                if (result.win) {
                    score++;
                    currentItem = userInput;
                    history.push(userInput);
                    document.getElementById("scoreDisplay").innerText = `Score: ${score}`;
                    document.getElementById("promptText").innerText = `What beats ${currentItem}?`;
                    document.getElementById("reasonDisplay").innerText = `✅ ${result.reason}`;
                    document.getElementById("guessInput").value = "";
                } else {
                    document.getElementById("reasonDisplay").innerText = `❌ Game Over! ${result.reason}`;
                }
            } catch (error) {
                document.getElementById("reasonDisplay").innerText = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
