<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>290045's What Beats Rock?</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; color: #1a1a1a; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); display: inline-block; max-width: 400px; width: 90%; position: relative; }
        input { padding: 12px; font-size: 16px; width: 80%; border: 2px solid #e4e6eb; border-radius: 6px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #0070f3; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 6px; font-weight: bold; width: 87%; transition: background 0.2s; }
        button:hover { background: #0051b3; }
        #reasonDisplay { margin-top: 20px; font-size: 16px; line-height: 1.4; color: #4e5d78; min-height: 24px; }
        .high-score { font-size: 14px; color: #8e9aa8; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="gameSection">
            <div id="highScoreDisplay" class="high-score">Personal Best: 0</div>
            <h2 id="scoreDisplay">Score: 0</h2>
            <h1 id="promptText">What beats Rock?</h1>
            <input type="text" id="guessInput" placeholder="Type your guess..." onkeypress="handleKeyPress(event)">
            <button onclick="submitGuess()">Submit</button>
            <p id="reasonDisplay"></p>
        </div>
    </div>

    <script>
        let currentItem = "rock";
        let score = 0;
        let history = ["rock"];
        let highScore = localStorage.getItem("wbr_high_score") || 0;

        // A built-in logical dictionary to judge rules without needing an AI API key
        const rules = {
            "rock": {
                weaknesses: ["paper", "water", "dynamite", "laser", "drill", "pickaxe", "earthquake", "tsunami", "acid"],
                reasons: { "paper": "Paper covers rock!", "water": "Water erodes rock over time!", "dynamite": "Dynamite blows rock to pieces!" }
            },
            "paper": {
                weaknesses: ["scissors", "fire", "acid", "shredder", "laser", "knife", "sword"],
                reasons: { "scissors": "Scissors cut paper!", "fire": "Fire burns paper completely!", "shredder": "A paper shredder destroys it!" }
            },
            "scissors": {
                weaknesses: ["rock", "fire", "laser", "hammer", "magnet", "rust", "acid"],
                reasons: { "rock": "Rock crushes scissors!", "fire": "Fire melts metal scissors!", "hammer": "A hammer smashes scissors!" }
            },
            "fire": {
                weaknesses: ["water", "sand", "extinguisher", "ice", "vacuum", "tsunami"],
                reasons: { "water": "Water douses fire!", "sand": "Sand smothers the flames!", "extinguisher": "Fire extinguisher puts it out!" }
            },
            "water": {
                weaknesses: ["sponge", "sun", "evaporation", "ice", "electricity", "dirt"],
                reasons: { "sponge": "Sponge absorbs all the water!", "sun": "The sun evaporates the water!", "electricity": "Electricity electrocutes the water!" }
            }
        };

        window.onload = function() {
            document.getElementById("highScoreDisplay").innerText = `Personal Best: ${highScore}`;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") submitGuess();
        }

        function submitGuess() {
            const userInput = document.getElementById("guessInput").value.trim().toLowerCase();
            if (!userInput) return;

            if (history.includes(userInput)) {
                document.getElementById("reasonDisplay").innerText = `Game Over! You already used "${userInput}".`;
                resetGame();
                return;
            }

            // Fallback rule mapping if the exact word isn't fully defined yet
            const targetRules = rules[currentItem] || { weaknesses: ["god", "black hole", "laser", "void", "universe"], reasons: {} };

            if (targetRules.weaknesses.includes(userInput) || userInput === "black hole" || userInput === "god" || userInput === "chuck norris") {
                // Determine a custom explanation or fallback text
                const reasonText = targetRules.reasons?.[userInput] || `${userInput} is dynamically stronger than ${currentItem}!`;
                
                score++;
                currentItem = userInput;
                history.push(userInput);
                
                document.getElementById("scoreDisplay").innerText = `Score: ${score}`;
                document.getElementById("promptText").innerText = `What beats ${currentItem.charAt(0).toUpperCase() + currentItem.slice(1)}?`;
                document.getElementById("reasonDisplay").innerText = `✅ ${reasonText}`;
                document.getElementById("guessInput").value = "";
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("wbr_high_score", highScore);
                    document.getElementById("highScoreDisplay").innerText = `Personal Best: ${highScore}`;
                }
            } else {
                document.getElementById("reasonDisplay").innerText = `❌ Game Over! ${userInput} cannot beat ${currentItem}.`;
                resetGame();
            }
        }

        function resetGame() {
            score = 0;
            currentItem = "rock";
            history = ["rock"];
            setTimeout(() => {
                document.getElementById("scoreDisplay").innerText = `Score: ${score}`;
                document.getElementById("promptText").innerText = `What beats Rock?`;
                document.getElementById("guessInput").value = "";
                document.getElementById("reasonDisplay").innerText = "";
            }, 3000);
        }
    </script>
</body>
</html>
